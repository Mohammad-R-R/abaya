services:
  # ─── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: abaya-backend
    env: node
    region: frankfurt
    plan: starter
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: abaya-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false

  # ─── Frontend ────────────────────────────────────────────────────────────────
  - type: web
    name: abaya-frontend
    env: static
    region: frankfurt
    plan: starter
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ─── PostgreSQL Database ─────────────────────────────────────────────────────
databases:
  - name: abaya-db
    region: frankfurt
    plan: starter
    databaseName: abaya_store
    user: abaya_user
